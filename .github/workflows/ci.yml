name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.check.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: test
            run: pytest -W error
          - name: lint
            run: |
              ruff check docket tests
              ruff format --check docket tests
          - name: types
            run: mypy docket tests
          - name: spell
            run: codespell --skip="*.lock,.git,__pycache__,.venv,*.egg-info,.pytest_cache,.mypy_cache,.ruff_cache,.claude"
          - name: security
            run: |
              pip-audit --skip-editable
              pip-licenses --fail-on="GPL;LGPL;AGPL"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ${{ matrix.check.name }}
        run: ${{ matrix.check.run }}
